services:
  mlflow:
    image: python:3.11-slim
    container_name: banking77_mlflow
    working_dir: /app
    command: >
      sh -c "pip install mlflow==3.8.1 && 
               mkdir -p /app/artifacts &&
               mlflow server 
               --host 0.0.0.0 
               --port 5000 
               --backend-store-uri sqlite:///mlflow.db 
               --default-artifact-root /app/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_data:/app
    networks:
      - banking77_network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5000/')",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: services/backend/Dockerfile
    container_name: banking77_api
    ports:
      - "8000:8000"
    depends_on:
      mlflow:
        condition: service_healthy
    networks:
      - banking77_network
    restart: unless-stopped
    volumes:
      - ./services/backend/logs:/app/logs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME: Banking77_DistilBERT
      MODEL_ALIAS: production
      DEBUG: false

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
    container_name: banking77_frontend
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - banking77_network
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
networks:
  banking77_network:
    driver: bridge
